<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        ul li::after{
            content: '!!!!!!!!!!!!!!!!!!!';
            color: red;
        }
        ul li::before{
            content: '';
            display: inline-block;
            width: 10px;
           height: 10px;
            background-color: red;
        }
       ul li{
           list-style-type: none;
       }
       ul{
           padding-inline-start: 0;
       }

    </style>


</head>
<body>
<ul>
    <li>Lorem ipsum dolor sit.</li>
    <li>Lorem ipsum dolor sit.</li>

    <li>Lorem ipsum dolor sit.</li>
    <li>Lorem ipsum dolor sit.</li>

</ul>





</body>
</html>

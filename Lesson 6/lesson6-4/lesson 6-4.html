<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>

    <style>
        button:hover {
            background-color:yellow;
        }
        button:active {
            background-color: pink;
        }
        a:link{
            text-decoration: none;
            color: green;
        }

        a:visited {
            text-decoration: none;
            color: blue;

        }
        li{
            color: brown;
        }
        li::marker {
            color: green;
        }
        p::selection {
            background-color: black;
            color: white;
        }
    </style>

</head>
<body>
<button>Lorem.</button>
<a href="http://google.com/">Lorem.</a>
<a href="http://google.com/">Lorem.</a>
